services:
  - type: web
    name: shopify-store-backend
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npx prisma migrate deploy
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: shopify_db
          property: connectionString
      - key: CLIENT_ORIGIN
        value: https://your-frontend-url.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: BCRYPT_SALT_ROUNDS
        value: 12

  - type: web
    name: shopify-store-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://your-backend-url.onrender.com/api/v1

databases:
  - name: shopify_db
    plan: free
    databaseName: shopify_store
    databaseUser: shopify_user
