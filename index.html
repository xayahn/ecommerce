<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta (overridden per-page by SEO.jsx) -->
    <title>ShopStore</title>
    <meta name="description" content="Your one-stop destination for electronics, fashion, home goods, and more." />
    <meta name="robots"      content="index,follow" />
    <meta name="theme-color" content="#a521ce" />

    <!-- Open Graph defaults -->
    <meta property="og:site_name"   content="ShopStore" />
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ShopStore" />
    <meta property="og:description" content="Your one-stop destination for electronics, fashion, home goods, and more." />
    <meta property="og:image"       content="https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=1200" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ShopStore" />
    <meta name="twitter:description" content="Your one-stop destination for electronics, fashion, home goods, and more." />

    <!-- Favicon -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical font -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
